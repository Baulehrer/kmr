services:
  kmr:
    build: .
    image: ghcr.io/baulehrer/kaufis-metal-radio:1.4.1
    container_name: kmr
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./data:/data
      - ./artists:/app/artists:ro
    environment:
      KMR_DB_PATH: /data/radio_cache.sqlite
      KMR_LIBRARY_PATH: /app/artists
    networks:
      - webproxy

networks:
  webproxy:
    external: true
