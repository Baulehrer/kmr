name: Release Kaufis Metal Radio

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  APP_VERSION: "1.4.1"

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.0" }
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: bun build frontend/index.html --outdir /tmp/kmr-frontend
      - run: docker compose config --quiet

  linux:
    needs: test
    runs-on: ubuntu-22.04
    env:
      PYTHON: ${{ github.workspace }}/.venv/bin/python
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.0" }
      - uses: dtolnay/rust-toolchain@stable
      - name: Systempakete installieren
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf python3-venv
      - run: bun install --frozen-lockfile
      - name: Python-Umgebung vorbereiten
        run: |
          python3 -m venv .venv
          "$PYTHON" -m pip install pyinstaller scrapling curl_cffi playwright browserforge
      - run: bun run desktop:prepare
      - name: AppImage-Grundpaket bauen
        run: bunx tauri build --bundles appimage --config '{"bundle":{"externalBin":[]}}'
      - name: Hilfsprogramme unverändert einbetten
        run: |
          appimage=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' -print -quit)
          mkdir -p /tmp/kmr-appimage dist
          chmod +x "$appimage"
          (cd /tmp/kmr-appimage && "$GITHUB_WORKSPACE/$appimage" --appimage-extract)
          install -m 755 src-tauri/binaries/kmr-server-x86_64-unknown-linux-gnu /tmp/kmr-appimage/squashfs-root/usr/bin/kmr-server
          install -m 755 src-tauri/binaries/kmr-ma-adapter-x86_64-unknown-linux-gnu /tmp/kmr-appimage/squashfs-root/usr/bin/kmr-ma-adapter
          curl -L --fail --retry 3 -o /tmp/appimagetool.AppImage https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool.AppImage
          ARCH=x86_64 /tmp/appimagetool.AppImage --appimage-extract-and-run /tmp/kmr-appimage/squashfs-root "dist/KMR_${APP_VERSION}_x86_64.AppImage"
          test -s "dist/KMR_${APP_VERSION}_x86_64.AppImage"
      - uses: actions/upload-artifact@v4
        with: { name: linux, path: dist/* }

  windows:
    needs: test
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.0" }
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install --frozen-lockfile
      - run: python -m pip install pyinstaller scrapling curl_cffi playwright browserforge
      - run: bun run desktop:prepare
      - run: bunx tauri build --no-bundle
      - name: Programmdateien signieren
        if: env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("certificate.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /f certificate.pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 src-tauri/target/release/kmr.exe src-tauri/binaries/*.exe
      - name: Inno-Installer bauen
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging/windows/kmr.iss'
      - name: Installer signieren
        if: env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /f certificate.pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "dist/KMR_$($env:APP_VERSION)_x64_Setup.exe"
      - name: Unsigniertes Paket markieren
        if: env.WINDOWS_CERTIFICATE == ''
        shell: pwsh
        run: Rename-Item "dist/KMR_$($env:APP_VERSION)_x64_Setup.exe" "KMR_$($env:APP_VERSION)_x64_unsigned-test_Setup.exe"
      - uses: actions/upload-artifact@v4
        with: { name: windows, path: dist/* }

  macos:
    needs: test
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
          - runner: macos-15
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    env:
      PYTHON: ${{ github.workspace }}/.venv/bin/python
      APPLE_CERTIFICATE_AVAILABLE: ${{ secrets.APPLE_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.0" }
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install --frozen-lockfile
      - name: Python-Umgebung vorbereiten
        run: |
          python3 -m venv .venv
          "$PYTHON" -m pip install pyinstaller scrapling curl_cffi playwright browserforge
      - run: bun run desktop:prepare
      - name: Signiertes DMG bauen
        if: env.APPLE_CERTIFICATE_AVAILABLE == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bunx tauri build --bundles dmg
      - name: Unsigniertes DMG bauen
        if: env.APPLE_CERTIFICATE_AVAILABLE != 'true'
        run: bunx tauri build --bundles dmg
      - name: Artefakt sammeln
        run: |
          mkdir -p dist
          file=$(find src-tauri/target/release/bundle/dmg -name '*.dmg' -print -quit)
          if [ "$APPLE_CERTIFICATE_AVAILABLE" = "true" ]; then name="KMR_${APP_VERSION}_${{ matrix.arch }}.dmg"; else name="KMR_${APP_VERSION}_${{ matrix.arch }}_unsigned-test.dmg"; fi
          cp "$file" "dist/$name"
      - uses: actions/upload-artifact@v4
        with: { name: "macos-${{ matrix.arch }}", path: dist/* }

  docker:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/baulehrer/kaufis-metal-radio:${{ env.APP_VERSION }},ghcr.io/baulehrer/kaufis-metal-radio:latest

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, windows, macos, docker]
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Artefakte einzeln herunterladen
        run: |
          mkdir -p dist
          for artifact in linux windows macos-x86_64 macos-aarch64; do
            for attempt in 1 2 3; do
              if gh run download "$GITHUB_RUN_ID" --name "$artifact" --dir dist; then break; fi
              if [ "$attempt" = 3 ]; then exit 1; fi
              sleep $((attempt * 15))
            done
          done
      - run: cd dist && sha256sum * > SHA256SUMS.txt
      - name: Release veröffentlichen
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --title "Kaufis Metal Radio $GITHUB_REF_NAME"
          fi
