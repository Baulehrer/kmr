name: Release Kaufis Metal Radio

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  APP_VERSION: "1.4.1"

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.0" }
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: bun build frontend/index.html --outdir /tmp/kmr-frontend
      - run: docker compose config --quiet

  linux:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.0" }
      - uses: dtolnay/rust-toolchain@stable
      - name: Systempakete installieren
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf python3-pip
      - run: bun install --frozen-lockfile
      - run: python3 -m pip install --break-system-packages pyinstaller scrapling curl_cffi playwright browserforge
      - run: bun run desktop:prepare
      - run: bunx tauri build --bundles appimage
      - name: Artefakt sammeln
        run: mkdir -p dist && cp src-tauri/target/release/bundle/appimage/*.AppImage "dist/KMR_${APP_VERSION}_x86_64.AppImage"
      - uses: actions/upload-artifact@v4
        with: { name: linux, path: dist/* }

  windows:
    needs: test
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.0" }
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install --frozen-lockfile
      - run: python -m pip install pyinstaller scrapling curl_cffi playwright browserforge
      - run: bun run desktop:prepare
      - run: bunx tauri build --no-bundle
      - name: Programmdateien signieren
        if: env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("certificate.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /f certificate.pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 src-tauri/target/release/kmr.exe src-tauri/binaries/*.exe
      - name: Inno-Installer bauen
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging/windows/kmr.iss'
      - name: Installer signieren
        if: env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /f certificate.pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "dist/KMR_$($env:APP_VERSION)_x64_Setup.exe"
      - name: Unsigniertes Paket markieren
        if: env.WINDOWS_CERTIFICATE == ''
        shell: pwsh
        run: Rename-Item "dist/KMR_$($env:APP_VERSION)_x64_Setup.exe" "KMR_$($env:APP_VERSION)_x64_unsigned-test_Setup.exe"
      - uses: actions/upload-artifact@v4
        with: { name: windows, path: dist/* }

  macos:
    needs: test
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: x86_64
          - runner: macos-14-xlarge
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.0" }
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install --frozen-lockfile
      - run: python3 -m pip install pyinstaller scrapling curl_cffi playwright browserforge
      - name: Zertifikat importieren
        if: env.APPLE_CERTIFICATE != ''
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions kmr.keychain
          security default-keychain -s kmr.keychain
          security unlock-keychain -p actions kmr.keychain
          security import certificate.p12 -k kmr.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions kmr.keychain
      - run: bun run desktop:prepare
      - run: bunx tauri build --bundles dmg
      - name: Artefakt sammeln
        run: |
          mkdir -p dist
          file=$(find src-tauri/target/release/bundle/dmg -name '*.dmg' -print -quit)
          if [ -n "$APPLE_CERTIFICATE" ]; then name="KMR_${APP_VERSION}_${{ matrix.arch }}.dmg"; else name="KMR_${APP_VERSION}_${{ matrix.arch }}_unsigned-test.dmg"; fi
          cp "$file" "dist/$name"
      - uses: actions/upload-artifact@v4
        with: { name: "macos-${{ matrix.arch }}", path: dist/* }

  docker:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/baulehrer/kaufis-metal-radio:${{ env.APP_VERSION }},ghcr.io/baulehrer/kaufis-metal-radio:latest

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, windows, macos, docker]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - run: cd dist && sha256sum * > SHA256SUMS.txt
      - env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --title "Kaufis Metal Radio $GITHUB_REF_NAME"
